# =============================================================================
# LOCAL PROFILE
# =============================================================================
# MongoDB URI comes from (first match wins):
#   1) This optional file (create from example — works like "before" without IntelliJ env):
#        src/main/resources/application-local-secret.properties
#        Copy: application-local-secret.properties.example → application-local-secret.properties
#   2) Environment variable MONGODB_URI (IntelliJ Run Configuration)
#   3) Default in application.properties → mongodb://localhost:27017/smart_inventory
#      (use Docker: docker compose up -d   OR install MongoDB locally)
#
# See: FIX_MONGODB_CONNECTION_REFUSED.md
# =============================================================================

spring.config.import=optional:classpath:application-local-secret.properties
