spring.application.name=Smart Inventory Management System

# Use environment to select profile.
# Default keeps your current dev behavior (`local`), but public deployment can switch to `prod`.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Server
server.port=8080

# MongoDB URI: use env MONGODB_URI, or gitignored application-local-secret.properties (local profile).
# Default: local Mongo (e.g. docker compose up -d)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_inventory}
spring.data.mongodb.auto-index-creation=true

# JWT (set JWT_SECRET in production)
app.jwt.secret=${JWT_SECRET:SmartInventoryManagementSystemJwtSecretKey2026EnterpriseMinimum32Characters}
app.jwt.expiration-ms=86400000

app.setup.secret=setup
app.admin.initial-password=${APP_ADMIN_INITIAL_PASSWORD:admin123}
app.admin.reset-on-start=${APP_ADMIN_RESET_ON_START:false}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Low stock job: 8 AM daily
app.low-stock.cron=0 0 8 * * ?

# Email (optional): set to enable low-stock email alerts
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# app.low-stock.email-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
