# Local MongoDB for Smart Inventory Management System.
# Run from project root:  docker compose up -d
# Then start the Spring Boot app (profile: local uses mongodb://localhost:27017/smart_inventory).
services:
  mongodb:
    image: mongo:7
    container_name: smart-inventory-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart_inventory
    volumes:
      - smart-inventory-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  smart-inventory-mongo-data:
