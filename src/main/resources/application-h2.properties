# Use this profile on a new machine or when Supabase is unreachable.
# Run with: spring.profiles.active=local,h2
# Or in IDE: Active profiles = local,h2
spring.datasource.url=jdbc:h2:file:./data/smart-inventory;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Optional: H2 console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:file:./data/smart-inventory)
spring.h2.console.enabled=true
